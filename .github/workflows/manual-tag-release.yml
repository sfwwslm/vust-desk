name: Manual Tag Release Build

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "The tag name to build from (e.g. v0.1.0)"
        required: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      name: ${{ steps.meta.outputs.name }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag metadata and check existence
        id: meta
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag_name }}"
          # 检查 Tag 是否存在
          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            echo "错误: 标签 $tag 不存在。"
            exit 1
          fi

          version=${tag#v} # 移除 'v' 前缀
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=Version $version" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          tag: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
        run: |
          # 如果 Release 已存在则报错并停止构建
          if gh release view "$tag" > /dev/null 2>&1; then
            echo "错误: Release $tag 已经存在。为防止意外修改已发布版本，构建将停止。"
            exit 1
          fi
          gh release create "$tag" --title "$name" --notes "Manual release for $tag." --prerelease

  publish-tauri:
    needs: [create-release]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout specific tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name }}

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}

      - name: Add Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/dev' }}
          prefix-key: "v1-rust"
          key: "rust-shared-stable-${{ matrix.os }}-${{ matrix.target }}"
          workspaces: |
            . -> target
          cache-all-crates: true
          cache-workspace-crates: true

      - name: Install dependencies (ubuntu only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxslt1.1 libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.13.0"

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Add Rust Target
        run: |
          rustup target add ${{ matrix.target }} --toolchain 1.92.0 || rustup target add ${{ matrix.target }}
          rustup target list --installed
          echo "Rust target ${{ matrix.target }} installed."

      - name: Tauri build and upload
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.create-release.outputs.tag }}
          releaseName: ${{ needs.create-release.outputs.name }}
          releaseBody: "Draft release, will be updated later."
          releaseDraft: true
          prerelease: true
          tauriScript: pnpm
          args: --target ${{ matrix.target }}
          includeUpdaterJson: true
